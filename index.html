<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FLICA Timer" />
  <title>FLICA Open Time Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-top: 12px;
      text-align: center;
    }

    .clock-bar {
      background: #1c1c1e;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clock-label { font-size: 13px; color: #888; }
    .clock-val { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; color: #f0f0f0; }
    .clock-tz { font-size: 11px; color: #555; margin-top: 2px; text-align: right; }

    .card {
      background: #1c1c1e;
      border-radius: 18px;
      padding: 20px;
    }

    .card-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .time-field span {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .time-field input {
      width: 100%;
      background: #2c2c2e;
      border: none;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 36px;
      font-weight: 600;
      text-align: center;
      padding: 14px 8px;
      outline: none;
      font-variant-numeric: tabular-nums;
      -webkit-appearance: none;
      appearance: none;
    }

    .time-field input:focus {
      background: #3a3a3c;
    }

    .colon {
      font-size: 36px;
      font-weight: 300;
      color: #555;
      padding-bottom: 18px;
    }

    .hint-text {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 12px;
    }

    .calc-btn {
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 14px;
      width: 100%;
      padding: 17px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .calc-btn:active { opacity: 0.75; }

    .error {
      font-size: 13px;
      color: #ff453a;
      text-align: center;
      display: none;
    }

    .result-card {
      background: #1c1c1e;
      border-radius: 18px;
      padding: 20px;
      border: 1.5px solid #0a84ff44;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .result-time {
      font-size: 44px;
      font-weight: 700;
      color: #0a84ff;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .result-date {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 0.5px solid #333;
      margin: 16px 0;
    }

    .countdown-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
      display: inline-block;
    }
    .dot.soon { background: #ff9f0a; }
    .dot.urgent { background: #ff453a; }

    .countdown {
      font-size: 34px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #f0f0f0;
    }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 10px;
    }

    .now-flash {
      font-size: 28px;
      font-weight: 700;
      color: #ff453a;
    }
  </style>
</head>
<body>

  <h1>FLICA Open Time</h1>

  <div class="clock-bar">
    <div>
      <div class="clock-label">Current time</div>
    </div>
    <div style="text-align:right;">
      <div class="clock-val" id="live-clock">--:-- --</div>
      <div class="clock-tz" id="tz-note"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Time pairing has been in open time</div>
    <div class="time-inputs">
      <div class="time-field">
        <input type="number" id="elapsed-h" min="0" max="23" placeholder="17" inputmode="numeric" />
        <span>Hours</span>
      </div>
      <div class="colon">:</div>
      <div class="time-field">
        <input type="number" id="elapsed-m" min="0" max="59" placeholder="36" inputmode="numeric" />
        <span>Minutes</span>
      </div>
    </div>
    <p class="hint-text">Enter what FLICA shows — e.g. 17:36 → 17 hrs, 36 min</p>
  </div>

  <div class="error" id="err-msg">Please enter valid hours (0–23) and minutes (0–59).</div>

  <button class="calc-btn" onclick="calculate()">Calculate Bid Window</button>

  <div class="result-card" id="result-card">
    <div class="result-label">Bid opens at</div>
    <div class="result-time" id="result-time">--</div>
    <div class="result-date" id="result-date"></div>
    <hr class="divider" />
    <div class="countdown-label">
      <span class="dot" id="status-dot"></span>
      Time until available
    </div>
    <div class="countdown" id="countdown">--:--:--</div>
    <div class="hint" id="result-hint"></div>
  </div>

  <script>
    let targetMs = null;
    let tickInterval = null;

    function startClock() {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      document.getElementById('tz-note').textContent = tz.replace(/_/g, ' ');
      function tick() {
        document.getElementById('live-clock').textContent =
          new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true }).format(new Date());
      }
      tick();
      setInterval(tick, 1000);
    }

    function calculate() {
      const eh = parseInt(document.getElementById('elapsed-h').value);
      const em = parseInt(document.getElementById('elapsed-m').value);
      const errEl = document.getElementById('err-msg');

      if (isNaN(eh) || isNaN(em) || eh < 0 || eh > 23 || em < 0 || em > 59) {
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';

      const now = new Date();
      const elapsedMs = (eh * 60 + em) * 60 * 1000;
      const openedAt = new Date(now.getTime() - elapsedMs);
      targetMs = openedAt.getTime() + 24 * 60 * 60 * 1000;

      document.getElementById('result-time').textContent =
        new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).format(new Date(targetMs));
      document.getElementById('result-date').textContent =
        new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(new Date(targetMs));

      document.getElementById('result-card').classList.add('visible');

      if (tickInterval) clearInterval(tickInterval);
      countdownTick();
      tickInterval = setInterval(countdownTick, 1000);

      document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function countdownTick() {
      const diff = targetMs - Date.now();
      const dot = document.getElementById('status-dot');
      const hint = document.getElementById('result-hint');
      const cdEl = document.getElementById('countdown');

      if (diff <= 0) {
        cdEl.innerHTML = '<span class="now-flash">GO — Bid NOW!</span>';
        dot.className = 'dot urgent';
        hint.textContent = 'The 24-hour window is up — click to grab it!';
        clearInterval(tickInterval);
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const pad = n => String(n).padStart(2, '0');
      cdEl.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

      if (diff < 30 * 60 * 1000) {
        dot.className = 'dot urgent';
        hint.textContent = 'Under 30 min — stay on FLICA and be ready!';
      } else if (diff < 2 * 60 * 60 * 1000) {
        dot.className = 'dot soon';
        hint.textContent = 'Getting close — set a reminder for 5 min before.';
      } else {
        dot.className = 'dot';
        hint.textContent = 'Countdown is live. Come back closer to bid time.';
      }
    }

    startClock();
  </script>
</body>
</html>
